# Railway service config for the FastAPI backend.
#
# Deploy:
#   railway service create travel-backend
#   railway up --service travel-backend -c deploy/railway.backend.toml
#
# Required env vars on the Railway service:
#   OPENAI_API_KEY
#   PINECONE_API_KEY
#   SUPABASE_DATABASE_URL
#   MCP_SERVER_URL          = https://travel-mcp-server.railway.app/sse
#   MCP_AUTH_TOKEN          (same secret as the mcp_server service)
#   CORS_ALLOWED_ORIGINS    = https://travel-mcp.vercel.app

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r backend/requirements.txt"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30
